name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── PR: require linked issue ───
  check-linked-issue:
    name: Linked issue required
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check PR body for issue reference
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Check for issue references: #123, Closes #123, Fixes #123, Resolves #123, etc.
          PATTERN='(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#[0-9]+|#[0-9]+'

          if echo "$PR_BODY" | grep -iqP "$PATTERN"; then
            echo "✅ Found linked issue in PR body"
            exit 0
          fi

          if echo "$PR_TITLE" | grep -iqP "$PATTERN"; then
            echo "✅ Found linked issue in PR title"
            exit 0
          fi

          echo "❌ PR must reference an issue (e.g. 'Closes #123' or '#123' in title or body)"
          echo ""
          echo "How to fix:"
          echo "  1. Create an issue first: https://github.com/${{ github.repository }}/issues/new"
          echo "  2. Add 'Closes #<number>' to your PR description"
          exit 1

  # ─── TypeScript: legal-th MCP Server ───
  legal-mcp:
    name: legal-th MCP (tsc build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: legal-th/mcp-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npx tsc --noEmit

  # ─── Bun: LINE Bot ───
  line-bot:
    name: LINE Bot (typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bot-service
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bunx tsc --noEmit

  # ─── Bun: Server ───
  server:
    name: Server (typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bot-service/server
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bunx tsc --noEmit

  # ─── Python: RAG Server ───
  legal-rag:
    name: RAG Server (syntax check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: legal-rag
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m py_compile main.py

  # ─── Docker Compose: build all ───
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [legal-mcp, line-bot, server, legal-rag]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build line-bot server legal-mcp legal-rag
